# goreleaser v2 — cross-platform binaries for kryptos.
# Local check:   goreleaser release --snapshot --clean
# Real release:  pushed tag → CI runs `goreleaser release --clean`
version: 2

project_name: kryptos

before:
  hooks:
    - go mod tidy

builds:
  - id: kryptos
    main: .
    binary: kryptos
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X source.example.com/example-org/kryptos/cmd.version={{ .Version }}
      - -X source.example.com/example-org/kryptos/cmd.commit={{ .Commit }}
      - -X source.example.com/example-org/kryptos/cmd.date={{ .Date }}

archives:
  - id: kryptos
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - schema/kryptos-v1.schema.json
      - templates/kryptos-config.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# GitLab releaser — GitLab serves source.example.com.
# CI provides GITLAB_TOKEN via the GitLab CI release job.
gitlab_urls:
  api: https://source.example.com/api/v4
  download: https://source.example.com
  # Upload release archives to the GitLab Generic Package Registry instead of
  # as release "attachments" (which are /-/…/uploads/ files that need session
  # auth, not PRIVATE-TOKEN, and have a 10 MB limit). Package Registry files
  # are token-downloadable via GET /packages/generic/<pkg>/<ver>/<file>, which
  # is how the argo-apps CI image bakes the kryptos binary for kryptos validate.
  use_package_registry: true

release:
  gitlab:
    owner: homelab
    name: kryptos
