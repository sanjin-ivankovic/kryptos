# LOCAL developer hooks only. CI does NOT run pre-commit — the equivalent
# checks run as native jobs in .gitlab-ci.yml (scan:secrets / lint:go / test:go
# / smoke:cli). Run `pre-commit install` locally to get fast pre-push feedback;
# CI is the authoritative gate.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # templates/kryptos-config.yaml is a multi-document file (--- separated:
        # an API-version doc + the annotated config doc), so allow it.
        args: ['--allow-multiple-documents']
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
        # The TUI/test fixtures legitimately generate ed25519 keys at runtime;
        # none are committed, so this guards against an accidental paste.
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      # Exclude vendored .claude/ skill docs (we don't manage their perms;
      # overwritten on plugin update).
      - id: check-executables-have-shebangs
        exclude: '^\.claude/'
      - id: check-shebang-scripts-are-executable
        exclude: '^\.claude/'
      # Validate JSON syntax (renovate.json, schema/kryptos-v1.schema.json, etc.).
      - id: check-json

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        # -c: centralize rules in .config/ (shared with the VS Code yamllint
        #   extension) instead of a root .yamllint.
        args: ['-c', '.config/.yamllint']

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.1
    hooks:
      - id: markdownlint-cli2
        # --config: same .config/ file the VS Code markdownlint extension reads.
        args: ['--config', '.config/.markdownlint-cli2.jsonc']

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ['feat', 'fix', 'docs', 'refactor', 'chore', 'test', 'ci', 'build']

  # Language-agnostic local hooks. `language: system` reuses the pinned
  # binaries in the CI image (same versions as the native CI jobs) instead of
  # letting pre-commit compile/pull them at runtime.
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (system)
        # `git` (history) mode scans TRACKED content and respects .gitignore.
        # --platform=gitlab matches the real origin (source.example.com is GitLab)
        # so finding links resolve to the correct /-/commit/<sha>#L<line> URLs.
        entry: gitleaks git --platform=gitlab --config .config/.gitleaks.toml --gitleaks-ignore-path .config/.gitleaksignore --redact --verbose --exit-code 1 .
        language: system
        pass_filenames: false
      - id: shellcheck
        name: shellcheck (system)
        entry: shellcheck --rcfile=.config/.shellcheckrc
        language: system
        types: [shell]

  # Go hooks. `language: system` reuses the local/CI Go toolchain (this repo's
  # CI image ships Go, unlike the argo-apps shared image). pass_filenames is off
  # because go commands take packages, not files.
  - repo: local
    hooks:
      - id: go-build-vet-test
        name: go build/vet/test
        entry: bash -c 'go build ./... && go vet ./... && go test ./... -cover'
        language: system
        files: '\.go$'
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'command -v golangci-lint >/dev/null 2>&1 && golangci-lint run ./... || echo "golangci-lint not installed; skipping"'
        language: system
        files: '\.go$'
        pass_filenames: false
      - id: kryptos-validate-self
        name: kryptos validate (templates parse)
        # No configs live in this repo, so validate has nothing to scan here;
        # this is a build smoke-test that the CLI still runs.
        entry: bash -c 'go run . validate --help >/dev/null'
        language: system
        files: '\.go$'
        pass_filenames: false
